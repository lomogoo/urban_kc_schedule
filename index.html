
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans, system-ui, -apple-system, sans-serif); }
.cal-wrap { padding: 1rem 0; max-width: 860px; }
.cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
.cal-title { font-size: 18px; font-weight: 500; color: var(--color-text-primary, #333); }
.cal-nav button { background: transparent; border: 0.5px solid var(--color-border-secondary, #ccc); border-radius: var(--border-radius-md, 6px); padding: 6px 14px; font-size: 13px; cursor: pointer; color: var(--color-text-primary, #333); }
.cal-nav button:hover { background: var(--color-background-secondary, #f5f5f5); }
.cal-nav { display: flex; gap: 8px; align-items: center; }
.weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-bottom: 2px; }
.weekday-label { text-align: center; font-size: 11px; font-weight: 500; color: var(--color-text-secondary, #666); padding: 6px 0; }
.days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.day-cell { border: 0.5px solid var(--color-border-tertiary, #e0e0e0); border-radius: 6px; padding: 6px 8px; min-height: 90px; display: flex; flex-direction: column; gap: 4px; }
.day-cell.empty { border: none; background: transparent; }
.day-cell.weekend-holiday { background: #f0f0f0; border-color: #ddd; }
.day-cell.weekend-holiday .day-num { color: #bbb; }
.day-cell.custom-gray { background: repeating-linear-gradient(45deg, #f0f0f0, #f0f0f0 4px, #e6e6e6 4px, #e6e6e6 8px); border-color: #ccc; }
.day-cell.custom-gray .day-num { color: #999; }
.day-cell.no-store { background: #ffe5e5; border-color: #ffbcbc; }
.day-cell.one-store { background: #fffbea; border-color: #ffe98a; }
.day-cell.full-store { background: white; }
.day-num-wrap { display: flex; align-items: center; justify-content: space-between; gap: 4px; }
.day-num { font-size: 13px; font-weight: 500; color: var(--color-text-primary, #333); line-height: 1; }
.day-toggle { font-size: 9px; cursor: pointer; color: #ddd; padding: 1px 4px; border: 0.5px solid #e8e8e8; border-radius: 3px; line-height: 1.5; background: transparent; white-space: nowrap; user-select: none; flex-shrink: 0; }
.day-toggle:hover { color: #888; border-color: #ccc; background: #f0f0f0; }
.day-toggle.active { color: #777; border-color: #bbb; background: #e0e0e0; }
.store-slot { display: flex; align-items: center; gap: 4px; }
select.store-select { font-size: 11px; padding: 2px 4px; border: 0.5px solid var(--color-border-secondary, #ccc); border-radius: 4px; background: white; color: var(--color-text-primary, #333); width: 100%; cursor: pointer; }
.legend { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 1.5rem; font-size: 12px; color: var(--color-text-secondary, #666); align-items: center; }
.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-dot { width: 14px; height: 14px; border-radius: 3px; border: 0.5px solid rgba(0,0,0,0.1); flex-shrink: 0; }
.add-store-section { margin-top: 1.5rem; display: flex; gap: 8px; align-items: center; border-top: 0.5px solid var(--color-border-tertiary, #e0e0e0); padding-top: 1rem; }
.add-store-section input { flex: 1; font-size: 13px; padding: 6px 10px; border: 0.5px solid var(--color-border-secondary, #ccc); border-radius: var(--border-radius-md, 6px); color: var(--color-text-primary, #333); background: var(--color-background-primary, white); }
.add-store-section button { font-size: 13px; padding: 6px 14px; background: transparent; border: 0.5px solid #378ADD; color: #185FA5; border-radius: var(--border-radius-md, 6px); cursor: pointer; font-weight: 500; }
.add-store-section button:hover { background: #e6f1fb; }
.store-list-section { margin-top: 1rem; border-top: 0.5px solid var(--color-border-tertiary, #e0e0e0); padding-top: 1rem; }
.store-list-title { font-size: 12px; color: var(--color-text-secondary, #666); margin-bottom: 8px; }
.store-list { display: flex; flex-wrap: wrap; gap: 6px; }
.store-pill { font-size: 11px; padding: 3px 10px; background: var(--color-background-secondary, #f5f5f5); border: 0.5px solid var(--color-border-tertiary, #e0e0e0); border-radius: 12px; color: var(--color-text-secondary, #666); display: flex; align-items: center; gap: 5px; }
.store-pill button { background: none; border: none; color: #bbb; cursor: pointer; font-size: 13px; line-height: 1; padding: 0; }
.store-pill button:hover { color: #e24b4a; }
.export-section { margin-top: 1.5rem; display: flex; gap: 10px; align-items: center; border-top: 0.5px solid var(--color-border-tertiary, #e0e0e0); padding-top: 1rem; }
.export-section-label { font-size: 12px; color: var(--color-text-secondary, #666); white-space: nowrap; }
.export-btn { font-size: 13px; padding: 6px 16px; background: transparent; border-radius: var(--border-radius-md, 6px); cursor: pointer; font-weight: 500; }
.export-btn.img-btn { border: 0.5px solid #378ADD; color: #185FA5; }
.export-btn.img-btn:hover { background: #e6f1fb; }
.export-btn.xl-btn { border: 0.5px solid #2E7D32; color: #2E7D32; }
.export-btn.xl-btn:hover { background: #e8f5e9; }
.exporting .day-toggle,
.exporting .cal-nav,
.exporting .export-section,
.exporting .add-store-section,
.exporting .store-list-section { display: none !important; }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<div class="cal-wrap" id="calWrap">
<h2 class="sr-only">店舗スケジュールカレンダー — 各日に最大2店舗を割り当て可能</h2>
<div class="cal-header">
  <div class="cal-title" id="calTitle"></div>
  <div class="cal-nav">
    <button onclick="changeMonth(-1)">← 前月</button>
    <button onclick="changeMonth(1)">翌月 →</button>
  </div>
</div>
<div class="weekdays">
  <div class="weekday-label">日</div>
  <div class="weekday-label">月</div>
  <div class="weekday-label">火</div>
  <div class="weekday-label">水</div>
  <div class="weekday-label">木</div>
  <div class="weekday-label">金</div>
  <div class="weekday-label">土</div>
</div>
<div class="days-grid" id="daysGrid"></div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#ffe5e5;border-color:#ffbcbc"></div>店舗なし（平日）</div>
  <div class="legend-item"><div class="legend-dot" style="background:#fffbea;border-color:#ffe98a"></div>1店舗のみ（平日）</div>
  <div class="legend-item"><div class="legend-dot" style="background:white;border-color:#ddd"></div>2店舗（完了）</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f0f0f0;border-color:#ddd"></div>土日祝（休業）</div>
  <div class="legend-item"><div class="legend-dot" style="background:repeating-linear-gradient(45deg,#f0f0f0,#f0f0f0 4px,#e6e6e6 4px,#e6e6e6 8px);border-color:#ccc"></div>任意休業日</div>
</div>

<div class="export-section">
  <span class="export-section-label">出力：</span>
  <button class="export-btn img-btn" onclick="exportImage()">画像で出力</button>
  <button class="export-btn xl-btn" onclick="exportExcel()">Excelで出力</button>
</div>

<div class="add-store-section">
  <input type="text" id="newStoreName" placeholder="新しい店舗名を入力..." />
  <button onclick="addStore()">+ 追加</button>
</div>

<div class="store-list-section">
  <div class="store-list-title">登録店舗一覧</div>
  <div class="store-list" id="storeList"></div>
</div>
</div>

<script>
const JAPAN_HOLIDAYS_2025 = ["2025-01-01","2025-01-13","2025-02-11","2025-02-23","2025-02-24","2025-03-20","2025-04-29","2025-05-03","2025-05-04","2025-05-05","2025-05-06","2025-07-21","2025-08-11","2025-09-15","2025-09-22","2025-09-23","2025-10-13","2025-11-03","2025-11-23","2025-11-24","2025-12-23"];
const JAPAN_HOLIDAYS_2026 = ["2026-01-01","2026-01-12","2026-02-11","2026-02-23","2026-03-20","2026-04-29","2026-05-03","2026-05-04","2026-05-05","2026-05-06","2026-07-20","2026-08-11","2026-09-21","2026-09-22","2026-09-23","2026-10-12","2026-11-03","2026-11-23","2026-12-23"];
const allHolidays = new Set([...JAPAN_HOLIDAYS_2025, ...JAPAN_HOLIDAYS_2026]);

let stores = ["Novel café","Foodie Gent","Route 227s' café","プヨ","チキンとポテトのお店ポテタロさん","つむKITCHEN","imohana","BLOOM","移動販売VEC","hot meal 3"];
let schedule = {};
let customGrayDays = new Set();
let currentDate = new Date();
let currentYear = currentDate.getFullYear();
let currentMonth = currentDate.getMonth();

function dateKey(y, m, d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function isHoliday(y, m, d) { return allHolidays.has(dateKey(y, m, d)); }
function isWeekend(dow) { return dow === 0 || dow === 6; }

function getSlots(key) {
  if (!schedule[key]) schedule[key] = [null, null];
  return schedule[key];
}

function toggleCustomGray(key) {
  if (customGrayDays.has(key)) {
    customGrayDays.delete(key);
  } else {
    customGrayDays.add(key);
  }
  render();
}

function render() {
  document.getElementById('calTitle').textContent = `${currentYear}年 ${currentMonth + 1}月`;
  const grid = document.getElementById('daysGrid');
  grid.innerHTML = '';

  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

  for (let i = 0; i < firstDay; i++) {
    const empty = document.createElement('div');
    empty.className = 'day-cell empty';
    grid.appendChild(empty);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const key = dateKey(currentYear, currentMonth, d);
    const dow = new Date(currentYear, currentMonth, d).getDay();
    const holiday = isHoliday(currentYear, currentMonth, d);
    const autoGray = isWeekend(dow) || holiday;
    const customGray = !autoGray && customGrayDays.has(key);
    const isGray = autoGray || customGray;
    const slots = getSlots(key);
    const filled = slots.filter(s => s !== null).length;

    const cell = document.createElement('div');
    cell.className = 'day-cell';
    if (autoGray) {
      cell.classList.add('weekend-holiday');
    } else if (customGray) {
      cell.classList.add('custom-gray');
    } else {
      if (filled === 0) cell.classList.add('no-store');
      else if (filled === 1) cell.classList.add('one-store');
      else cell.classList.add('full-store');
    }

    const numWrap = document.createElement('div');
    numWrap.className = 'day-num-wrap';

    const numDiv = document.createElement('div');
    numDiv.className = 'day-num';
    numDiv.textContent = d;
    if (holiday && !isWeekend(dow)) numDiv.style.color = '#bbb';
    numWrap.appendChild(numDiv);

    if (!autoGray) {
      const toggleBtn = document.createElement('span');
      toggleBtn.className = 'day-toggle' + (customGray ? ' active' : '');
      toggleBtn.textContent = '休';
      toggleBtn.title = customGray ? 'クリックで休業解除' : 'クリックで休業日に設定';
      toggleBtn.addEventListener('click', () => toggleCustomGray(key));
      numWrap.appendChild(toggleBtn);
    }

    cell.appendChild(numWrap);

    for (let si = 0; si < 2; si++) {
      const wrap = document.createElement('div');
      wrap.className = 'store-slot';
      const sel = document.createElement('select');
      sel.className = 'store-select';
      const none = document.createElement('option');
      none.value = '';
      none.textContent = isGray ? '休業日' : '';
      sel.appendChild(none);
      if (!isGray) {
        stores.forEach(s => {
          const opt = document.createElement('option');
          opt.value = s;
          opt.textContent = s;
          if (slots[si] === s) opt.selected = true;
          sel.appendChild(opt);
        });
        sel.addEventListener('change', (e) => {
          const val = e.target.value || null;
          const currentSlots = getSlots(key);
          const other = currentSlots[1 - si];
          if (val && val === other) { e.target.value = currentSlots[si] || ''; return; }
          currentSlots[si] = val;
          render();
        });
      } else {
        sel.disabled = true;
        sel.style.color = '#bbb';
        sel.style.borderColor = '#e0e0e0';
      }
      if (slots[si] && !isGray) sel.value = slots[si];
      wrap.appendChild(sel);
      cell.appendChild(wrap);
    }

    grid.appendChild(cell);
  }

  renderStoreList();
}

function renderStoreList() {
  const list = document.getElementById('storeList');
  list.innerHTML = '';
  stores.forEach((s, i) => {
    const pill = document.createElement('div');
    pill.className = 'store-pill';
    pill.innerHTML = `<span>${s}</span><button title="削除" onclick="removeStore(${i})">×</button>`;
    list.appendChild(pill);
  });
}

function changeMonth(delta) {
  currentMonth += delta;
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  render();
}

function addStore() {
  const input = document.getElementById('newStoreName');
  const name = input.value.trim();
  if (!name) return;
  if (stores.includes(name)) { input.value = ''; return; }
  stores.push(name);
  input.value = '';
  render();
}

function removeStore(idx) {
  const name = stores[idx];
  if (!confirm(`「${name}」を削除しますか？\n割り当て済みのスケジュールからも削除されます。`)) return;
  stores.splice(idx, 1);
  Object.keys(schedule).forEach(k => {
    schedule[k] = schedule[k].map(s => s === name ? null : s);
  });
  render();
}

function exportImage() {
  if (typeof html2canvas === 'undefined') {
    alert('画像出力ライブラリの読み込みに失敗しました。ネットワーク接続を確認してください。');
    return;
  }
  const wrap = document.getElementById('calWrap');
  wrap.classList.add('exporting');
  html2canvas(wrap, {
    backgroundColor: '#ffffff',
    scale: 2,
    useCORS: true,
    onclone: (clonedDoc) => {
      clonedDoc.querySelectorAll('select.store-select').forEach(sel => {
        const div = clonedDoc.createElement('div');
        const selectedOpt = sel.options[sel.selectedIndex];
        div.textContent = selectedOpt ? selectedOpt.textContent : '';
        div.style.cssText = sel.disabled
          ? 'font-size:11px;padding:2px 4px;border:0.5px solid #e0e0e0;border-radius:4px;background:transparent;color:#bbb;width:100%;min-height:20px;line-height:1.6;'
          : 'font-size:11px;padding:2px 4px;border:0.5px solid #ccc;border-radius:4px;background:white;color:#333;width:100%;min-height:20px;line-height:1.6;';
        sel.parentNode.replaceChild(div, sel);
      });
    }
  }).then(canvas => {
    wrap.classList.remove('exporting');
    const link = document.createElement('a');
    link.download = `schedule_${currentYear}_${String(currentMonth+1).padStart(2,'0')}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  }).catch(err => {
    wrap.classList.remove('exporting');
    alert('画像の生成に失敗しました。');
    console.error(err);
  });
}

function exportExcel() {
  if (typeof XLSX === 'undefined') {
    alert('Excel出力ライブラリの読み込みに失敗しました。ネットワーク接続を確認してください。');
    return;
  }

  const wb = XLSX.utils.book_new();
  const wsData = [];

  wsData.push([`${currentYear}年 ${currentMonth + 1}月 スケジュール`, '', '', '', '', '', '']);
  wsData.push(['日', '月', '火', '水', '木', '金', '土']);

  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

  let row = Array(7).fill('');
  let col = firstDay;

  for (let d = 1; d <= daysInMonth; d++) {
    const key = dateKey(currentYear, currentMonth, d);
    const dow = new Date(currentYear, currentMonth, d).getDay();
    const holiday = isHoliday(currentYear, currentMonth, d);
    const autoGray = isWeekend(dow) || holiday;
    const customGray = !autoGray && customGrayDays.has(key);
    const isGray = autoGray || customGray;
    const slots = getSlots(key);

    const lines = [`${d}日`];
    if (isGray) {
      lines.push('休業日');
    } else {
      if (slots[0]) lines.push(slots[0]);
      if (slots[1]) lines.push(slots[1]);
    }
    row[col] = lines.join('\n');

    col++;
    if (col === 7 || d === daysInMonth) {
      wsData.push([...row]);
      row = Array(7).fill('');
      col = 0;
    }
  }

  const ws = XLSX.utils.aoa_to_sheet(wsData);
  ws['!cols'] = Array(7).fill({ wch: 18 });
  ws['!merges'] = [{ s: { r: 0, c: 0 }, e: { r: 0, c: 6 } }];

  const range = XLSX.utils.decode_range(ws['!ref']);
  for (let R = range.s.r; R <= range.e.r; R++) {
    for (let C = range.s.c; C <= range.e.c; C++) {
      const addr = XLSX.utils.encode_cell({ r: R, c: C });
      if (!ws[addr]) ws[addr] = { t: 's', v: '' };
      ws[addr].s = { alignment: { wrapText: true, vertical: 'top' } };
    }
  }

  XLSX.utils.book_append_sheet(wb, ws, `${currentYear}年${currentMonth+1}月`);
  XLSX.writeFile(wb, `schedule_${currentYear}_${String(currentMonth+1).padStart(2,'0')}.xlsx`);
}

document.getElementById('newStoreName').addEventListener('keydown', e => { if (e.key === 'Enter') addStore(); });
render();
</script>
